name: Generate Profile Cards

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=Matthrve&show_icons=true&theme=midnight-purple&hide_border=true&locale=es
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=Matthrve&layout=compact&theme=midnight-purple&hide_border=true&langs_count=6
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate trophy card
        continue-on-error: true
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: Matthrve
          file: profile/trophy.svg
          theme: tokyonight
          no-frame: "true"
          token: ${{ secrets.TROPHY_TOKEN }}

      - name: Commit cards
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update profile cards" || exit 0
          git push
          
